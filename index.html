<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETAPLUG</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */

{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f8fafc;
color:#111;
line-height:1.5;
}

/ ===== HEADER ===== /

header{
background:white;
padding:25px 20px;
text-align:center;
border-bottom:1px solid #eee;
}

header h1{
font-size:30px;
font-weight:700;
}

header p{
color:#666;
margin-top:6px;
}

/ ===== CONTAINER ===== /

.container{
max-width:1100px;
margin:auto;
padding:30px 20px;
}

/ ===== PRODUCTS GRID ===== /

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:28px;
}

/ ===== PRODUCT CARD ===== /

.product{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 24px rgba(0,0,0,.06);
transition:.25s;
}

.product:hover{
box-shadow:0 12px 28px rgba(0,0,0,.08);
}

.product img{
width:100%;
height:240px;
object-fit:cover;
background:#fafafa;
}

.product-content{
padding:22px;
text-align:center;
}

.product h2{
font-size:20px;
margin-bottom:8px;
}

.price{
font-size:22px;
font-weight:600;
margin-bottom:18px;
}

/ ===== BUTTON ===== /

.order-btn{
display:inline-block;
background:#111;
color:white;
padding:13px 22px;
border-radius:10px;
text-decoration:none;
font-weight:600;
}

.order-btn:hover{
background:#000;
}

/ ===== CONTACT ===== /

.contact{
margin-top:50px;
background:white;
border-radius:16px;
padding:30px;
box-shadow:0 8px 24px rgba(0,0,0,.06);
text-align:center;
}

.contact h2{
margin-bottom:25px;
}

.contact-buttons{
display:flex;
justify-content:center;
gap:18px;
flex-wrap:wrap;
}

.contact-btn{
display:flex;
align-items:center;
gap:12px;
padding:14px 26px;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:600;
}

.signal{background:#3a76f0;}
.whatsapp{background:#25D366;}

.contact-btn img{
width:22px;
}

/ ===== FOOTER ===== /

footer{
margin-top:50px;
text-align:center;
padding:20px;
color:#777;
font-size:14px;
}

/ ===== MOBILE ===== */

@media(max-width:600px){

header h1{
font-size:24px;
}

.product img{
height:200px;
}

}

</style>
</head>

<body>

<header>
<h1>RETAPLUG</h1>
<p>Nowoczesne produkty • Szybki kontakt</p>
</header>

<div class="container">

<div class="products">

<!-- PRODUCT -->
<div class="product">
<img src="https://cdn.discordapp.com/attachments/1480950041253380181/1488275511800103172/peptide-science-retatrutide.png">
<div class="product-content">
<h2>RETA</h2>
<p class="price">150 ZŁ — 5MG</p>

<a class="order-btn"
href="https://wa.link/j23blp"
target="_blank">
Zamów
</a>
</div>
</div>

<!-- PRODUCT -->
<div class="product">
<img src="https://cdn.discordapp.com/attachments/1480950041253380181/1488275620734435338/peptide-sciences-pt-141-10mg-x-10-vials-500x500.png">
<div class="product-content">
<h2>BPC-157</h2>
<p class="price">70 ZŁ — 10MG</p>

<a class="order-btn"
href="https://wa.link/j23blp"
target="_blank">
Zamów
</a>
</div>
</div>

</div>

<!-- CONTACT -->

<div class="contact">
<h2>Kontakt</h2>

<div class="contact-buttons">

<a class="contact-btn signal"
href="https://signal.me/#eu/arsYbB67malNy2i8puW6U9endLUYt5gZLkm67hu1jGLNJ3xFqglAVIM5JnWb8Qjd"
target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/8d/Signal-Logo.svg">
Signal
</a>

<a class="contact-btn whatsapp"
href="https://wa.link/j23blp"
target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
WhatsApp
</a>

</div>

</div>

</div>

<footer>
© 2026 RETAPLUG
</footer>

</body>
</html>
