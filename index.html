<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RETAPLUG</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ===== BODY ===== */

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
background:#f5f5f7;
color:#1d1d1f;
line-height:1.6;
-webkit-font-smoothing:antialiased;
}

/* ===== HEADER ===== */

header{
text-align:center;
padding:60px 20px 40px;
}

header h1{
font-size:34px;
font-weight:600;
letter-spacing:-0.5px;
}

header p{
color:#6e6e73;
margin-top:8px;
font-size:15px;
}

/* ===== CONTAINER ===== */

.container{
max-width:1100px;
margin:auto;
padding:0 20px 60px;
}

/* ===== GRID ===== */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:32px;
}

/* ===== CARD ===== */

.product{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
border-radius:20px;
overflow:hidden;
transition:all .3s ease;
border:1px solid rgba(0,0,0,0.04);
}

.product:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

/* IMAGE */

.product img{
width:100%;
height:220px;
object-fit:cover;
background:#fff;
}

/* CONTENT */

.product-content{
padding:22px;
text-align:center;
}

.product h2{
font-size:18px;
font-weight:600;
margin-bottom:6px;
}

.price{
font-size:20px;
font-weight:500;
color:#111;
margin-bottom:18px;
}

/* BUTTON */

.order-btn{
display:inline-block;
background:#1d1d1f;
color:white;
padding:12px 22px;
border-radius:999px;
text-decoration:none;
font-size:14px;
font-weight:500;
transition:all .25s ease;
}

.order-btn:hover{
background:#000;
transform:scale(1.05);
}

/* ===== CONTACT ===== */

.contact{
margin-top:70px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
border-radius:20px;
padding:40px 20px;
text-align:center;
border:1px solid rgba(0,0,0,0.04);
}

.contact h2{
font-weight:600;
margin-bottom:25px;
}

.contact-buttons{
display:flex;
justify-content:center;
gap:16px;
flex-wrap:wrap;
}

/* CONTACT BUTTON */

.contact-btn{
display:flex;
align-items:center;
gap:10px;
padding:12px 20px;
border-radius:999px;
text-decoration:none;
font-size:14px;
font-weight:500;
color:white;
transition:.25s;
}

.contact-btn:hover{
transform:scale(1.05);
}

.signal{background:#3a76f0;}
.whatsapp{background:#25D366;}

.contact-btn img{
width:18px;
}

/* ===== FOOTER ===== */

footer{
text-align:center;
padding:30px 10px;
font-size:13px;
color:#86868b;
}

/* ===== MOBILE ===== */

@media(max-width:600px){

header{
padding:40px 20px 30px;
}

header h1{
font-size:26px;
}

.product img{
height:180px;
}

}

</style>
</head>

<body>

<header>
<h1>RETAPLUG</h1>
<p>Nowoczesne produkty • Minimalizm • Szybki kontakt</p>
</header>

<div class="container">

<div class="products">

<div class="product">
<img src="https://cdn.discordapp.com/attachments/1480950041253380181/1488275511800103172/peptide-science-retatrutide.png">
<div class="product-content">
<h2>RETA</h2>
<p class="price">150 ZŁ — 5MG</p>

<a class="order-btn" href="https://wa.link/j23blp" target="_blank">
Zamów
</a>
</div>
</div>

<div class="product">
<img src="https://cdn.discordapp.com/attachments/1480950041253380181/1488275620734435338/peptide-sciences-pt-141-10mg-x-10-vials-500x500.png">
<div class="product-content">
<h2>BPC-157</h2>
<p class="price">70 ZŁ — 10MG</p>

<a class="order-btn" href="https://wa.link/j23blp" target="_blank">
Zamów
</a>
</div>
</div>

</div>

<div class="contact">
<h2>Kontakt</h2>

<div class="contact-buttons">

<a class="contact-btn signal"
href="https://signal.me/#eu/arsYbB67malNy2i8puW6U9endLUYt5gZLkm67hu1jGLNJ3xFqglAVIM5JnWb8Qjd"
target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/8d/Signal-Logo.svg">
Signal
</a>

<a class="contact-btn whatsapp"
href="https://wa.link/j23blp"
target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
WhatsApp
</a>

</div>

</div>

</div>

<footer>
© 2026 RETAPLUG
</footer>

</body>
</html>
