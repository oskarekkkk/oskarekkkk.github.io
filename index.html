<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETAPLUG</title>

<style>

/* ===== RESET ===== */

{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6f8;
color:#222;
}

/ ===== HEADER ===== /

header{
background:#111;
color:white;
padding:25px 15px;
text-align:center;
}

header h1{
font-size:28px;
letter-spacing:1px;
}

header p{
opacity:.7;
margin-top:5px;
}

/ ===== CONTAINER ===== /

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/ ===== PRODUCTS ===== /

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.product{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
display:flex;
flex-direction:column;
}

.product img{
width:100%;
height:240px;
object-fit:cover;
background:#fafafa;
}

.product-content{
padding:18px;
text-align:center;
flex:1;
}

.product h2{
margin-bottom:10px;
}

.price{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}

/ ===== BUTTON ===== /

.order-btn{
display:inline-block;
background:#111;
color:white;
padding:12px 18px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

/ ===== CONTACT ===== /

.contact{
margin-top:40px;
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
text-align:center;
}

.contact h2{
margin-bottom:20px;
}

.contact-buttons{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
}

.contact-btn{
display:flex;
align-items:center;
gap:10px;
padding:14px 22px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
}

.signal{background:#3a76f0;}
.whatsapp{background:#25D366;}

.contact-btn img{
width:22px;
height:22px;
}

/ ===== FOOTER ===== /

footer{
margin-top:40px;
background:#111;
color:white;
text-align:center;
padding:18px;
font-size:14px;
opacity:.8;
}

/ ===== MOBILE ===== */

@media(max-width:600px){

header h1{
font-size:22px;
}

.product img{
height:200px;
}

}

</style>
</head>

<body>

<header>
<h1>RETAPLUG</h1>
<p>Dostępne produkty</p>
</header>

<div class="container">

<div class="products">

<!-- PRODUCT 1 -->
<div class="product">
<img src="https://cdn.discordapp.com/attachments/1480950041253380181/1488275511800103172/peptide-science-retatrutide.png">
<div class="product-content">
<h2>RETA</h2>
<p class="price">150 ZŁ — 5MG</p>

<a class="order-btn"
href="https://wa.link/j23blp"
target="_blank">
Zamów
</a>
</div>
</div>

<!-- PRODUCT 2 -->
<div class="product">
<img src="https://cdn.discordapp.com/attachments/1480950041253380181/1488275620734435338/peptide-sciences-pt-141-10mg-x-10-vials-500x500.png">
<div class="product-content">
<h2>BPC-157</h2>
<p class="price">70 ZŁ — 10MG</p>

<a class="order-btn"
href="https://wa.link/j23blp"
target="_blank">
Zamów
</a>
</div>
</div>

</div>

<!-- CONTACT -->

<div class="contact">
<h2>Kontakt</h2>

<div class="contact-buttons">

<a class="contact-btn signal"
href="https://signal.me/#eu/arsYbB67malNy2i8puW6U9endLUYt5gZLkm67hu1jGLNJ3xFqglAVIM5JnWb8Qjd"
target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/8d/Signal-Logo.svg">
Signal
</a>

<a class="contact-btn whatsapp"
href="https://wa.link/j23blp"
target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
WhatsApp
</a>

</div>

</div>

</div>

<footer>
© 2026 RETAPLUG
</footer>

</body>
</html>
