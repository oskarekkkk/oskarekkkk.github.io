<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moje Produkty</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }
    .products {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .product {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      flex: 1 1 45%;
      text-align: center;
    }
    .product img {
      max-width: 100%;
      border-radius: 10px;
    }
    .contact {
      margin-top: 30px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    footer {
      text-align: center;
      padding: 15px;
      background: #333;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>
<body>

<header>
  <h1>Moje Produkty</h1>
  <p>Sprawdź naszą ofertę</p>
</header>

<div class="container">

  <div class="products">

    <div class="product">
      <img src="produkt1.jpg" alt="Produkt 1">
      <h2>Produkt 1</h2>
      <p>Krótki opis produktu 1.</p>
    </div>

    <div class="product">
      <img src="produkt2.jpg" alt="Produkt 2">
      <h2>Produkt 2</h2>
      <p>Krótki opis produktu 2.</p>
    </div>

  </div>

  <div class="contact">
    <h2>Kontakt</h2>
    <p>Email: twoj@email.com</p>
    <p>Telefon: 123 456 789</p>
  </div>

</div>

<footer>
  <p>&copy; 2026 Moja Firma</p>
</footer>

</body>
</html>
